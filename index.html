<!DOCTYPE html>

<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Flowform Pro</title>

<meta
name="description"
content="Generate beautiful procedural wallpapers in 4K, 5K, 8K, mobile and tablet formats."

>

<meta
property="og:title"
content="Flowform Pro"
/>

<meta
property="og:description"
content="Generative wallpaper studio."
/>

<link rel="manifest" href="manifest.json">

<link rel="icon" href="favicon.svg">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link
  href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
  rel="stylesheet"
>

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/themes.css">

</head>

<body class="theme-dark">

<button class="mobile-toggle">
☰
</button>

<div class="app">

  <aside class="sidebar">

```
<div class="logo">
  <h1>Flowform</h1>
  <span class="version">Pro</span>
</div>

<div class="section">

  <div class="section-title">
    Resolution
  </div>

  <div class="control">

    <label>
      Export Preset
    </label>

    <select id="preset">

      <option value="1080p">
        Full HD (1920×1080)
      </option>

      <option value="1440p">
        QHD (2560×1440)
      </option>

      <option value="4k" selected>
        4K UHD (3840×2160)
      </option>

      <option value="5k">
        5K (5120×2880)
      </option>

      <option value="8k">
        8K (7680×4320)
      </option>

      <option value="phone">
        Phone (1440×3120)
      </option>

      <option value="tablet">
        Tablet (2048×2732)
      </option>

    </select>

  </div>

</div>

<div class="section">

  <div class="section-title">
    Wallpaper
  </div>

  <div class="control">

    <label>
      Lines
      <span id="linesValue">
        40
      </span>
    </label>

    <input
      id="lines"
      type="range"
      min="5"
      max="100"
      value="40"
    >

  </div>

  <div class="control">

    <label>
      Amplitude
      <span id="ampValue">
        80
      </span>
    </label>

    <input
      id="amp"
      type="range"
      min="0"
      max="300"
      value="80"
    >

  </div>

  <div class="control">

    <label>
      Frequency
      <span id="freqValue">
        6
      </span>
    </label>

    <input
      id="freq"
      type="range"
      min="1"
      max="20"
      value="6"
    >

  </div>

  <div class="control">

    <label>
      Stroke Width
      <span id="strokeValue">
        3
      </span>
    </label>

    <input
      id="stroke"
      type="range"
      min="1"
      max="20"
      value="3"
    >

  </div>

  <div class="control">

    <label>
      Style
    </label>

    <select id="style">
      <option value="stroke">
        Stroke
      </option>

      <option value="ribbon">
        Ribbon
      </option>
    </select>

  </div>

</div>

<div class="section">

  <div class="section-title">
    Colors
  </div>

  <div class="color-grid">

    <div>

      <label>
        Line
      </label>

      <input
        id="lineColor"
        type="color"
        value="#ffffff"
      >

    </div>

    <div>

      <label>
        Background
      </label>

      <input
        id="bgColor"
        type="color"
        value="#000000"
      >

    </div>

  </div>

</div>

<div class="section">

  <div class="section-title">
    Theme
  </div>

  <select id="themeSelect">

    <option value="theme-dark">
      Dark
    </option>

    <option value="theme-light">
      Light
    </option>

    <option value="theme-midnight">
      Midnight
    </option>

    <option value="theme-aurora">
      Aurora
    </option>

    <option value="theme-forest">
      Forest
    </option>

    <option value="theme-sunset">
      Sunset
    </option>

    <option value="theme-neon">
      Neon
    </option>

  </select>

</div>

<div class="section">

  <div class="section-title">
    Presets
  </div>

  <div class="preset-grid">

    <div
      class="preset-card"
      data-preset="topo"
    >
      <div class="preset-name">
        Topo
      </div>
    </div>

    <div
      class="preset-card"
      data-preset="terrain"
    >
      <div class="preset-name">
        Terrain
      </div>
    </div>

    <div
      class="preset-card"
      data-preset="silk"
    >
      <div class="preset-name">
        Silk
      </div>
    </div>

    <div
      class="preset-card"
      data-preset="ocean"
    >
      <div class="preset-name">
        Ocean
      </div>
    </div>

    <div
      class="preset-card"
      data-preset="aurora"
    >
      <div class="preset-name">
        Aurora
      </div>
    </div>

    <div
      class="preset-card"
      data-preset="zen"
    >
      <div class="preset-name">
        Zen
      </div>
    </div>

  </div>

</div>

<div class="btn-group">

  <button
    id="randomize"
    class="btn-primary"
  >
    Randomize
  </button>

  <button
    id="shareBtn"
    class="btn-secondary"
  >
    Share Design
  </button>

  <button
    id="downloadPNG"
    class="btn-success"
  >
    Export PNG
  </button>

  <button
    id="downloadSVG"
    class="btn-secondary"
  >
    Export SVG
  </button>

  <button
    id="downloadJSON"
    class="btn-secondary"
  >
    Export JSON
  </button>

</div>
```

  </aside>

  <main class="canvas-area">

```
<div class="canvas-toolbar">

  <div class="toolbar-pill">
    Flowform Pro
  </div>

</div>

<svg
  id="wallpaper"
  xmlns="http://www.w3.org/2000/svg"
></svg>
```

  </main>

</div>

<script src="js/presets.js"></script>

<script src="js/flowfield.js"></script>

<script src="js/renderer.js"></script>

<script src="js/export.js"></script>

<script src="js/share.js"></script>

<script src="js/ui.js"></script>

<script src="js/app.js"></script>

</body>
</html>
